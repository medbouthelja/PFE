nelmio_cors:
    defaults:
        origin_regex: true
        allow_origin: ['^http://localhost(:\d+)?$', '^http://127\.0\.0\.1(:\d+)?$']
        allow_methods: ['GET', 'OPTIONS', 'POST', 'PUT', 'PATCH', 'DELETE']
        allow_headers: ['Content-Type', 'Authorization', 'X-Requested-With']
        expose_headers: ['Link']
        max_age: 3600
    paths:
        '^/api/': ~
